<!DOCTYPE html>
<html>
    <head>
		<title>Vim for Google Docs</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <link rel="stylesheet" href="mvp.css">
        <style>
            .btn {
                width: 250px;
                margin-top: 7px;
                margin-bottom: 7px;
            }
        </style>
    </head>
    <body style="width: 332px; text-align: center; margin: 0 auto; padding: 0;">
        <h1 style="margin-top: 5px; margin-bottom: 0;">Vim for Google Docs</h1>
        <h2 style="margin-bottom: 0px; margin-top: 5px;">Plans and Pricing</h2>
        <header id="newUser" style="display: none; width: 300px; padding-top: 0px; padding-bottom: 0px;">
            <button id="payButton" class="btn">Subscribe - $10/yr</button>
            <button id="payLicenseButton" class="btn">Buy Forever - $25</button>
            <button id="trialButton" class="btn">Start Free Trial</button>
            <p style="font-size: 16px;"><b>Free Trial:</b> 14 Days, No CC Needed</p>
        </header>
        <header id="trialUser" style="display: none; width: 250px; padding-top: 0px; padding-bottom: 0px;">
            <button id="payButton" class="btn">Subscribe - $10/yr</button>
            <button id="payLicenseButton" class="btn">Buy Forever - $25</button>
            <h2 style="margin-bottom: 0;">Trial In Process:</h2>
            <p id="trialTimeLeft" style="font-size: 16px; margin-top: 3px;">Time Left: </p>
        </header>
        <header id="expiredTrialUser" style="display: none; width: 250px; padding-top: 0px; padding-bottom: 0px;">
            <button id="payButton" class="btn">Subscribe - $10/yr</button>
            <button id="payLicenseButton" class="btn">Buy Forever - $25</button>
            <h2>Trial Expired, Upgrade To Keep Using Vim!</h2>
        </header>
        <header id="paidUser" style="display: none; width: 300px; padding-top: 0px; padding-bottom: 0px;">
            <button id="payButton" class="btn">Manage Billing</button>
        </header>
        <header id="pastDueUser" style="display: none; width: 300px; padding-top: 0px; padding-bottom: 0px;">
            <h2>Past Due: Update Billing Info</h2>
            <button id="payButton" class="btn">Update Billing Info</button>
        </header>
        <header id="cancelledUser" style="display: none; width: 300px; padding-top: 0px; padding-bottom: 0px;">
            <h2>Canceled: Update Billing Info</h2>
            <button id="payButton" class="btn">Update Subscription - $10/yr</button>
            <button id="payLicenseButton" class="btn">Buy Forever - $25</button>
        </header>
        <button id="shortCutButton" class="btn">See & Remap Keys</button>
        <button id="loginButton" class="btn">Login</button>

        <h2 style="margin-bottom: 0px;">Support & Feature Requests:</h2>
        <p style="margin-top: 0px; margin-bottom: 5px; font-size: 16px;">Support@VimForDocs.com</p>
        <a href="changelog.html" style="font-size: 14px; margin-bottom: 15px;" target="_blank">Change Log, Version 1.15</a>
        <script src="dist/ExtPay.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
